services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: studyflow
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
