# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify_main:
    name: firebase-live-verify-main
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test server
        run: bun run --cwd server test
      - name: Build web
        run: bun run --cwd web build

  build_and_deploy:
    name: firebase-live-deploy
    needs: verify_main
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Build web app
        run: bun run --cwd web build
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GDG_AI_COMPANION }}
          channelId: live
          projectId: gdg-ai-companion
