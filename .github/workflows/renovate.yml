name: Renovate

on:
  schedule:
    - cron: '0 4 * * 1' # Mondays 4am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: renovate-self-hosted
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: renovatebot/github-action@a897a2d3c7cfdbf2521c432dc8b2fef45a43e2ad # v41.0.11
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # GITHUB_TOKEN PRs don't auto-trigger CI (platform rule).
          # Workaround: the next step triggers ci.yml on each new Renovate branch.
          RENOVATE_AUTODISCOVER: false
          RENOVATE_REPOSITORIES: ${{ github.repository }}

      - name: Trigger CI on new Renovate PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr list \
            --author "app/github-actions" \
            --state open \
            --json headRefName \
            --jq '.[].headRefName' | \
          while IFS= read -r branch; do
            echo "Triggering CI on branch: $branch"
            gh workflow run ci.yml --ref "$branch" || true
          done
