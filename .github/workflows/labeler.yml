name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR by changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Pinned tag (v5) — avoids broken short tags / missing SHAs in some GitHub runs
      - uses: actions/labeler@v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
