name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  test-server:
    name: ci-test-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Test server
        run: bun run --cwd server test

  build:
    name: ci-build-web-extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Build web and extension
        run: bun run build

  dependency-review:
    name: ci-dependency-review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  required:
    name: ci-required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [lint, test-server, build, dependency-review]
    steps:
      - name: Enforce required CI results
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.test-server.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.dependency-review.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "A required CI job did not pass (result=$result)."
              exit 1
            fi
          done
