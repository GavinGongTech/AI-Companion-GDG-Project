name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
          cache: "bun"
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  test-server:
    name: ci-test-server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
          cache: "bun"
      - run: bun install --frozen-lockfile
      - name: Test server
        run: bun run --cwd server test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: ./server/coverage/lcov.info
          flags: server
          fail_ci_if_error: false

  build:
    name: ci-build-web-extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
          cache: "bun"
      - run: bun install --frozen-lockfile
      - name: Build web and extension
        run: bun run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-placeholder

      - name: Report compressed bundle sizes
        uses: preactjs/compressed-size-action@66325aad6443cb7cf89c4bfcd414aea2367cda94 # v2.9.1
        if: ${{ github.event_name == 'pull_request' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: "{web/dist/**/*.{js,css},extension/dist/**/*.{js,css}}"
          strip-hash: "-[A-Za-z0-9]{8}\\.js$"

  dependency-review:
    name: ci-dependency-review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  required:
    name: ci-required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [lint, test-server, build, dependency-review]
    steps:
      - name: Enforce required CI results
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.test-server.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.dependency-review.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "A required CI job did not pass (result=$result)."
              exit 1
            fi
          done
